# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://jpanther.github.io/congo/docs/getting-started/
baseURL = "https://calebxb.com/"
theme = "congo"
defaultContentLanguage = "en"

# Site title (top-left menu / logo)
title = "Caleb Bugg"

# Optional: override top-left menu text (if you want it to say "Home")
[params]
logo = "Home"
# Default author info for pages that don't specify one
  defaultAuthor = "Caleb Bugg"
  defaultAuthorBio = "Caleb is a researcher focused on stochastic optimization, large-scale models, and policy recommendations."
  defaultAuthorImage = "images/author.jpg" # relative to your 'assets' or 'static' folder

# Article display settings
[params.article]
  showAuthor = true
  showBreadcrumbs = true
  showDate = true
  showDateUpdated = false
  showWordCount = false
  showReadingTime = true
  showEdit = false
  showTableOfContents = false

[pagination]
  pagerSize = 15

[outputs]
  home = ["HTML", "RSS", "JSON"]

[privacy]
  [privacy.vimeo]
    enableDNT = true
  [privacy.x]
    enableDNT = true
  [privacy.youTube]
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true
